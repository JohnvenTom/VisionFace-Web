# ============================================================
# YOLO 人脸检测数据集配置文件
# ============================================================
# 数据集路径（支持绝对路径和相对路径）
path: ./datasets  # 数据集根目录

# 数据集划分
train: images/train  # 训练集图像目录
val: images/val      # 验证集图像目录
test: images/val     # 测试集（可选，默认使用验证集）

# 类别数量
nc: 1  # 只检测人脸这一个类别

# 类别名称
names:
  0: face  # 类别0：人脸
