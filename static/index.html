<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionFace - YOLOv11 人脸检测系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 背景网格 -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- 顶部导航 -->
    <header class="top-bar">
        <div class="logo">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect x="2" y="2" width="24" height="24" rx="4" stroke="var(--accent)" stroke-width="2"/>
                    <circle cx="10" cy="12" r="2.5" fill="var(--accent)"/>
                    <circle cx="18" cy="12" r="2.5" fill="var(--accent)"/>
                    <path d="M9 18 Q14 22 19 18" stroke="var(--accent)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="logo-text">
                <span class="logo-title">VisionFace</span>
                <span class="logo-sub">YOLOv11 Face Detection</span>
            </div>
        </div>
        <div class="status-bar">
            <div class="status-item" id="serverStatus">
                <span class="status-dot"></span>
                <span class="status-label">服务状态</span>
            </div>
            <div class="status-item" id="modelStatus">
                <span class="status-dot"></span>
                <span class="status-label">模型状态</span>
            </div>
            <div class="status-item" id="deviceStatus">
                <span class="status-dot"></span>
                <span class="status-label">推理设备</span>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-layout">
        <!-- 左侧控制面板 -->
        <aside class="control-panel">
            <!-- 模式切换 -->
            <section class="panel-section">
                <h3 class="section-title">
                    <span class="title-icon">&#9678;</span>
                    检测模式
                </h3>
                <div class="mode-switch">
                    <button class="mode-btn active" data-mode="image" id="btnImageMode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        图片检测
                    </button>
                    <button class="mode-btn" data-mode="camera" id="btnCameraMode">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        实时摄像头
                    </button>
                </div>
            </section>

            <!-- 图片上传区域 -->
            <section class="panel-section" id="imageUploadSection">
                <h3 class="section-title">
                    <span class="title-icon">&#9744;</span>
                    图片上传
                </h3>
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text">拖拽图片到此处或点击选择</p>
                    <p class="upload-hint">支持 JPG / PNG / JPEG</p>
                    <input type="file" id="fileInput" accept="image/jpg,image/png,image/jpeg" hidden>
                </div>
            </section>

            <!-- 摄像头控制区域 -->
            <section class="panel-section hidden" id="cameraControlSection">
                <h3 class="section-title">
                    <span class="title-icon">&#9899;</span>
                    摄像头控制
                </h3>
                <div class="camera-controls">
                    <button class="ctrl-btn primary" id="btnStartCamera">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                        开启摄像头
                    </button>
                    <button class="ctrl-btn danger" id="btnStopCamera" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="1"/>
                        </svg>
                        关闭摄像头
                    </button>
                    <button class="ctrl-btn warning" id="btnPauseDetect" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="4" width="4" height="16"/>
                            <rect x="14" y="4" width="4" height="16"/>
                        </svg>
                        暂停检测
                    </button>
                </div>
            </section>

            <!-- 参数调节 -->
            <section class="panel-section">
                <h3 class="section-title">
                    <span class="title-icon">&#9881;</span>
                    参数调节
                </h3>
                <div class="param-group">
                    <div class="param-item">
                        <div class="param-header">
                            <label>置信度阈值</label>
                            <span class="param-value" id="confValue">0.50</span>
                        </div>
                        <input type="range" class="param-slider" id="confSlider"
                               min="0.1" max="0.9" step="0.05" value="0.5">
                        <div class="param-range">
                            <span>0.1</span><span>0.9</span>
                        </div>
                    </div>
                    <div class="param-item">
                        <div class="param-header">
                            <label>NMS IoU阈值</label>
                            <span class="param-value" id="iouValue">0.45</span>
                        </div>
                        <input type="range" class="param-slider" id="iouSlider"
                               min="0.1" max="0.9" step="0.05" value="0.45">
                        <div class="param-range">
                            <span>0.1</span><span>0.9</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 操作按钮 -->
            <section class="panel-section">
                <button class="action-btn reset" id="btnReset">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="1 4 1 10 7 10"/>
                        <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
                    </svg>
                    重置检测
                </button>
            </section>
        </aside>

        <!-- 右侧检测展示区 -->
        <div class="display-area">
            <!-- 统计信息栏 -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-icon face-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="faceCount">0</span>
                        <span class="stat-label">检测人脸</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon time-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="inferenceTime">0 ms</span>
                        <span class="stat-label">推理耗时</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon fps-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <span class="stat-value" id="fpsValue">-- FPS</span>
                        <span class="stat-label">实时帧率</span>
                    </div>
                </div>
            </div>

            <!-- 检测画布区域 -->
            <div class="canvas-container" id="canvasContainer">
                <!-- 空状态提示 -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.4">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <p class="empty-text">上传图片或开启摄像头开始检测</p>
                    <p class="empty-hint">支持多人脸实时检测</p>
                </div>
                <!-- 图片检测画布 -->
                <canvas id="imageCanvas" class="detect-canvas hidden"></canvas>
                <!-- 摄像头视频 -->
                <video id="cameraVideo" class="detect-canvas hidden" autoplay playsinline></video>
                <!-- 摄像头检测画布 -->
                <canvas id="cameraCanvas" class="detect-canvas hidden"></canvas>
                <!-- 扫描线动画 -->
                <div class="scan-line hidden" id="scanLine"></div>
            </div>

            <!-- 检测结果列表 -->
            <div class="results-panel" id="resultsPanel">
                <h3 class="results-title">检测结果详情</h3>
                <div class="results-list" id="resultsList">
                    <div class="results-empty">暂无检测结果</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p class="loading-text">正在检测中...</p>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/imageDetect.js"></script>
    <script src="js/cameraDetect.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
